
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title desc">
  <title id="title">Markdown Studio app icon</title>
  <desc id="desc">A modern rounded-square app icon with a dark gradient background, a simplified split-pane editor card, and a bold M monogram suggesting markdown and live preview.</desc>

  <defs>
    <linearGradient id="bg" x1="64" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>

    <linearGradient id="card" x1="124" y1="92" x2="392" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>

    <linearGradient id="accent" x1="150" y1="140" x2="380" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>

    <linearGradient id="accentSoft" x1="150" y1="170" x2="370" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="iconClip">
      <rect x="24" y="24" width="464" height="464" rx="108"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
    <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#bg)"/>

    <circle cx="136" cy="116" r="118" fill="#38bdf8" opacity="0.10"/>
    <circle cx="408" cy="416" r="156" fill="#8b5cf6" opacity="0.12"/>

    <path d="M92 82C92 62 108 46 128 46H384C404 46 420 62 420 82V112H92V82Z" fill="#ffffff" opacity="0.05"/>
    <path d="M52 392C120 346 193 324 272 326C344 328 407 352 468 406V488H52V392Z" fill="#ffffff" opacity="0.04"/>

    <!-- main app card -->
    <g filter="url(#shadow)">
      <rect x="108" y="92" width="296" height="328" rx="64" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    </g>

    <!-- title bar -->
    <rect x="132" y="120" width="248" height="22" rx="11" fill="#ffffff" opacity="0.07"/>
    <circle cx="152" cy="131" r="4.5" fill="#fb7185"/>
    <circle cx="168" cy="131" r="4.5" fill="#fbbf24"/>
    <circle cx="184" cy="131" r="4.5" fill="#4ade80"/>

    <!-- simplified split-view reference -->
    <rect x="132" y="160" width="98" height="212" rx="22" fill="#ffffff" opacity="0.045"/>
    <rect x="282" y="160" width="98" height="212" rx="22" fill="#ffffff" opacity="0.045"/>
    <rect x="252" y="160" width="8" height="212" rx="4" fill="url(#accent)" opacity="0.68"/>

    <!-- left editor stubs -->
    <rect x="152" y="186" width="58" height="10" rx="5" fill="url(#accent)" opacity="0.72"/>
    <rect x="152" y="210" width="42" height="8" rx="4" fill="#cbd5e1" opacity="0.38"/>
    <rect x="152" y="226" width="58" height="8" rx="4" fill="#cbd5e1" opacity="0.28"/>
    <rect x="152" y="252" width="40" height="8" rx="4" fill="#67e8f9" opacity="0.72"/>
    <rect x="152" y="268" width="62" height="8" rx="4" fill="#cbd5e1" opacity="0.25"/>
    <rect x="152" y="302" width="62" height="38" rx="10" fill="#ffffff" opacity="0.06"/>

    <!-- right preview stubs -->
    <rect x="302" y="186" width="58" height="12" rx="6" fill="#ffffff" opacity="0.70"/>
    <rect x="302" y="210" width="58" height="3" rx="1.5" fill="url(#accent)" opacity="0.72"/>
    <rect x="302" y="230" width="58" height="8" rx="4" fill="#cbd5e1" opacity="0.30"/>
    <rect x="302" y="246" width="44" height="8" rx="4" fill="#cbd5e1" opacity="0.22"/>
    <rect x="302" y="274" width="58" height="46" rx="12" fill="#ffffff" opacity="0.06"/>

    <!-- primary monogram -->
    <g filter="url(#glow)">
      <!-- left stroke -->
      <path d="M176 330L216 206C220 194 237 194 241 206L256 250L271 206C275 194 292 194 296 206L336 330"
            fill="none" stroke="url(#accentSoft)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- framing chevrons -->
      <path d="M150 224L118 256L150 288" fill="none" stroke="#67e8f9" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
      <path d="M362 224L394 256L362 288" fill="none" stroke="#a78bfa" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
    </g>

    <!-- subtle bottom chip -->
    <rect x="166" y="386" width="180" height="12" rx="6" fill="#ffffff" opacity="0.08"/>
  </g>
</svg>
