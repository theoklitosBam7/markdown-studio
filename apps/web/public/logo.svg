<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep slate to rich indigo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>

    <!-- Accent gradient: teal to violet -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>

    <!-- Glow filter for accent elements -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner shadow for the card -->
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Clip path for rounded corners on the whole icon -->
    <clipPath id="roundedBg">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>

    <!-- Clip for the "screen" card -->
    <clipPath id="cardClip">
      <rect x="56" y="120" width="400" height="280" rx="20" ry="20"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#roundedBg)">
    <rect width="512" height="512" fill="url(#bgGrad)"/>

    <!-- Subtle grid texture -->
    <g opacity="0.04" stroke="#ffffff" stroke-width="1">
      <line x1="0" y1="64" x2="512" y2="64"/>
      <line x1="0" y1="128" x2="512" y2="128"/>
      <line x1="0" y1="192" x2="512" y2="192"/>
      <line x1="0" y1="256" x2="512" y2="256"/>
      <line x1="0" y1="320" x2="512" y2="320"/>
      <line x1="0" y1="384" x2="512" y2="384"/>
      <line x1="0" y1="448" x2="512" y2="448"/>
      <line x1="64" y1="0" x2="64" y2="512"/>
      <line x1="128" y1="0" x2="128" y2="512"/>
      <line x1="192" y1="0" x2="192" y2="512"/>
      <line x1="256" y1="0" x2="256" y2="512"/>
      <line x1="320" y1="0" x2="320" y2="512"/>
      <line x1="384" y1="0" x2="384" y2="512"/>
      <line x1="448" y1="0" x2="448" y2="512"/>
    </g>

    <!-- Ambient glow blobs -->
    <ellipse cx="130" cy="160" rx="160" ry="120" fill="#38bdf8" opacity="0.05"/>
    <ellipse cx="380" cy="370" rx="180" ry="130" fill="#818cf8" opacity="0.07"/>

    <!-- === MAIN CARD === -->
    <rect x="56" y="120" width="400" height="280" rx="20" ry="20"
          fill="#12151f" filter="url(#cardShadow)"
          stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

    <!-- Card top bar (title bar) -->
    <rect x="56" y="120" width="400" height="36" rx="0" ry="0" fill="#0d0f1a"/>
    <rect x="56" y="120" width="400" height="36" rx="20" ry="20" fill="#0d0f1a"/>
    <rect x="56" y="138" width="400" height="18" fill="#0d0f1a"/>

    <!-- Traffic light dots -->
    <circle cx="90" cy="138" r="5.5" fill="#ff5f57" opacity="0.9"/>
    <circle cx="108" cy="138" r="5.5" fill="#febc2e" opacity="0.9"/>
    <circle cx="126" cy="138" r="5.5" fill="#28c840" opacity="0.9"/>

    <!-- Divider line between panes (vertical, at center) -->
    <line x1="256" y1="156" x2="256" y2="400"
          stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.5"/>

    <!-- === LEFT PANE: editor / markdown text === -->
    <!-- Cursor line indicator -->
    <rect x="76" y="172" width="3" height="18" rx="1.5" fill="url(#accentGrad)" filter="url(#glow)"/>

    <!-- "# Heading" -->
    <rect x="88" y="175" width="28" height="7" rx="3" fill="#818cf8" opacity="0.9"/>
    <rect x="122" y="175" width="60" height="7" rx="3" fill="#e2e8f0" opacity="0.7"/>

    <!-- Line 2: paragraph text stubs -->
    <rect x="76" y="196" width="80" height="5" rx="2.5" fill="#64748b" opacity="0.8"/>
    <rect x="162" y="196" width="45" height="5" rx="2.5" fill="#64748b" opacity="0.6"/>

    <!-- Line 3 -->
    <rect x="76" y="208" width="55" height="5" rx="2.5" fill="#64748b" opacity="0.7"/>
    <rect x="137" y="208" width="70" height="5" rx="2.5" fill="#64748b" opacity="0.5"/>

    <!-- "**bold**" accent -->
    <rect x="76" y="222" width="30" height="5" rx="2.5" fill="#38bdf8" opacity="0.85"/>
    <rect x="112" y="222" width="50" height="5" rx="2.5" fill="#64748b" opacity="0.6"/>

    <!-- Code block stub -->
    <rect x="76" y="237" width="155" height="28" rx="5" fill="#1e2235" opacity="0.9"/>
    <rect x="84" y="245" width="12" height="4" rx="2" fill="#38bdf8" opacity="0.8"/>
    <rect x="100" y="245" width="35" height="4" rx="2" fill="#a78bfa" opacity="0.7"/>
    <rect x="84" y="254" width="50" height="4" rx="2" fill="#64748b" opacity="0.6"/>
    <rect x="140" y="254" width="25" height="4" rx="2" fill="#38bdf8" opacity="0.5"/>

    <!-- More paragraph lines -->
    <rect x="76" y="278" width="72" height="5" rx="2.5" fill="#64748b" opacity="0.7"/>
    <rect x="154" y="278" width="48" height="5" rx="2.5" fill="#64748b" opacity="0.5"/>

    <rect x="76" y="290" width="100" height="5" rx="2.5" fill="#64748b" opacity="0.6"/>

    <!-- List items -->
    <circle cx="82" cy="308" r="2.5" fill="#38bdf8" opacity="0.7"/>
    <rect x="90" y="305" width="65" height="5" rx="2.5" fill="#64748b" opacity="0.6"/>

    <circle cx="82" cy="320" r="2.5" fill="#38bdf8" opacity="0.7"/>
    <rect x="90" y="317" width="50" height="5" rx="2.5" fill="#64748b" opacity="0.5"/>

    <circle cx="82" cy="332" r="2.5" fill="#38bdf8" opacity="0.7"/>
    <rect x="90" y="329" width="78" height="5" rx="2.5" fill="#64748b" opacity="0.6"/>

    <!-- Link text stub -->
    <rect x="76" y="347" width="40" height="5" rx="2.5" fill="#38bdf8" opacity="0.8"/>
    <rect x="122" y="347" width="60" height="5" rx="2.5" fill="#64748b" opacity="0.5"/>

    <!-- === RIGHT PANE: rendered preview === -->
    <!-- H1 rendered -->
    <rect x="272" y="172" width="90" height="10" rx="4" fill="#f1f5f9" opacity="0.88"/>
    <!-- H1 underline accent -->
    <rect x="272" y="186" width="90" height="2" rx="1" fill="url(#accentGrad)" opacity="0.6"/>

    <!-- Rendered paragraph -->
    <rect x="272" y="198" width="168" height="5" rx="2.5" fill="#94a3b8" opacity="0.7"/>
    <rect x="272" y="208" width="140" height="5" rx="2.5" fill="#94a3b8" opacity="0.6"/>
    <rect x="272" y="218" width="100" height="5" rx="2.5" fill="#94a3b8" opacity="0.5"/>

    <!-- Mermaid / diagram box -->
    <rect x="272" y="232" width="168" height="80" rx="8" fill="#0d0f1a" opacity="0.8"
          stroke="rgba(56,189,248,0.2)" stroke-width="1"/>

    <!-- Diagram nodes — simple flowchart representation -->
    <!-- Node A -->
    <rect x="306" y="244" width="40" height="18" rx="4" fill="#1e3a4f" stroke="#38bdf8" stroke-width="1" opacity="0.9"/>
    <rect x="312" y="250" width="28" height="4" rx="2" fill="#38bdf8" opacity="0.7"/>
    <rect x="312" y="256" width="18" height="3" rx="1.5" fill="#38bdf8" opacity="0.4"/>

    <!-- Arrow down -->
    <line x1="326" y1="262" x2="326" y2="276" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
    <polygon points="322,274 326,282 330,274" fill="#818cf8" opacity="0.7"/>

    <!-- Node B -->
    <rect x="306" y="282" width="40" height="18" rx="4" fill="#2d1f4e" stroke="#818cf8" stroke-width="1" opacity="0.9"/>
    <rect x="312" y="288" width="22" height="4" rx="2" fill="#a78bfa" opacity="0.7"/>
    <rect x="312" y="294" width="15" height="3" rx="1.5" fill="#a78bfa" opacity="0.4"/>

    <!-- Right side node C -->
    <rect x="376" y="258" width="40" height="18" rx="4" fill="#1f3a2e" stroke="#34d399" stroke-width="1" opacity="0.8"/>
    <rect x="382" y="264" width="28" height="4" rx="2" fill="#34d399" opacity="0.7"/>
    <rect x="382" y="270" width="16" height="3" rx="1.5" fill="#34d399" opacity="0.4"/>

    <!-- Arrow from A to C -->
    <line x1="346" y1="253" x2="376" y2="264" stroke="#34d399" stroke-width="1.5" opacity="0.5"/>

    <!-- More rendered text below diagram -->
    <rect x="272" y="324" width="168" height="5" rx="2.5" fill="#94a3b8" opacity="0.6"/>
    <rect x="272" y="334" width="120" height="5" rx="2.5" fill="#94a3b8" opacity="0.5"/>

    <!-- Rendered bold span -->
    <rect x="272" y="348" width="55" height="5" rx="2.5" fill="#f1f5f9" opacity="0.8"/>
    <rect x="333" y="348" width="80" height="5" rx="2.5" fill="#94a3b8" opacity="0.5"/>

    <!-- === BOTTOM BAR (status bar) === -->
    <rect x="56" y="380" width="400" height="20" fill="#0a0c14"/>
    <rect x="56" y="378" width="400" height="2" fill="url(#accentGrad)" opacity="0.3"/>

    <!-- Status bar chips -->
    <rect x="72" y="385" width="42" height="8" rx="3" fill="#1e2235"/>
    <rect x="74" y="387" width="38" height="4" rx="2" fill="#38bdf8" opacity="0.6"/>

    <rect x="120" y="385" width="36" height="8" rx="3" fill="#1e2235"/>
    <rect x="122" y="387" width="32" height="4" rx="2" fill="#64748b" opacity="0.6"/>

    <!-- Word count chip right-aligned -->
    <rect x="390" y="385" width="50" height="8" rx="3" fill="#1e2235"/>
    <rect x="392" y="387" width="46" height="4" rx="2" fill="#818cf8" opacity="0.5"/>

    <!-- === ACCENT: glowing "M" mark at top center === -->
    <g filter="url(#glow)">
      <!-- Outer ring -->
      <circle cx="256" cy="80" r="32" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.8"/>
      <!-- Inner fill -->
      <circle cx="256" cy="80" r="26" fill="#12151f" opacity="0.95"/>
      <!-- M letterform using paths -->
      <text x="256" y="87"
            font-family="'Courier New', 'Courier', monospace"
            font-size="26"
            font-weight="700"
            text-anchor="middle"
            fill="url(#accentGrad)"
            letter-spacing="-1">M</text>
    </g>

  </g>
</svg>
