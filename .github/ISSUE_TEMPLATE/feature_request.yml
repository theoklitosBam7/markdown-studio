name: Feature Request
description: Suggest a new feature or improvement
title: 'feat: '
labels: ['enhancement']
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like to see.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of the proposed feature
      placeholder: Describe the feature in detail
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem It Solves
      description: What problem does this solve? Why is it needed?
      placeholder: The problem this solves...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How should it work?
      placeholder: Describe the proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you considered?
      placeholder: Alternatives...

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Screenshots
      description: Attach mockups or sketches if applicable
      placeholder: Attach or drag images here

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - Low - Nice to have
        - Medium - Would improve the app
        - High - Would significantly improve UX
        - Critical - Must have for next release

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information
      placeholder: Additional context...
