name: Sync labels

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview label changes without writing to GitHub.
        required: true
        type: boolean
        default: true
      delete_missing:
        description: Delete labels that are absent from .github/labels.yml.
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

concurrency:
  group: sync-labels
  cancel-in-progress: false

jobs:
  sync:
    name: Sync repository labels
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            .github/labels.yml
            .github/scripts/sync-labels.rb

      - name: Sync labels
        env:
          DELETE_MISSING: ${{ inputs.delete_missing }}
          DRY_RUN: ${{ inputs.dry_run }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ruby .github/scripts/sync-labels.rb
