name: Pull Request Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pull-request-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-24.04
    outputs:
      run_changeset_check: ${{ steps.compute.outputs.run_changeset_check }}
      run_full_workflow: ${{ steps.compute.outputs.run_full_workflow }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter meaningful changed paths
        if: github.event_name == 'pull_request'
        id: meaningful_filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            meaningful_changes:
              - 'apps/**/*.{ts,vue,js,json}'
              - 'packages/**/*.{ts,vue,js,json}'
              - 'cypress/**/*'
              - '**/__tests__/**'
              - '**/*.spec.ts'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '**/vite.config.ts'
              - '**/tsconfig.json'
              - '.github/workflows/*.yml'

      - name: Filter release changed paths
        if: github.event_name == 'pull_request'
        id: release_filter
        uses: dorny/paths-filter@v4
        with:
          predicate-quantifier: 'every'
          filters: |
            # These source workspaces feed the shipped desktop app or npm package,
            # even when their own package names are ignored by Changesets.
            desktop_release_changes:
              - 'apps/desktop/**/*'
              - '!**/__tests__/**'
              - '!**/*.spec.ts'
              - '!**/*.md'
            web_release_changes:
              - 'apps/web/**/*'
              - '!**/__tests__/**'
              - '!**/*.spec.ts'
              - '!**/*.md'
            cli_release_changes:
              - 'packages/cli/**/*'
              - '!**/__tests__/**'
              - '!**/*.spec.ts'
              - '!**/*.md'
            app_release_changes:
              - 'packages/app/**/*'
              - '!**/__tests__/**'
              - '!**/*.spec.ts'
              - '!**/*.md'
            desktop_contract_release_changes:
              - 'packages/desktop-contract/**/*'
              - '!**/__tests__/**'
              - '!**/*.spec.ts'
              - '!**/*.md'

      - name: Compute workflow scope
        id: compute
        env:
          MEANINGFUL_CHANGED: ${{ steps.meaningful_filter.outputs.meaningful_changes }}
          DESKTOP_RELEASE_CHANGED: ${{ steps.release_filter.outputs.desktop_release_changes }}
          WEB_RELEASE_CHANGED: ${{ steps.release_filter.outputs.web_release_changes }}
          CLI_RELEASE_CHANGED: ${{ steps.release_filter.outputs.cli_release_changes }}
          APP_RELEASE_CHANGED: ${{ steps.release_filter.outputs.app_release_changes }}
          DESKTOP_CONTRACT_RELEASE_CHANGED: ${{ steps.release_filter.outputs.desktop_contract_release_changes }}
        run: |
          run_changeset_check=false
          run_full_workflow=false

          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$MEANINGFUL_CHANGED" = "true" ]; then
            run_full_workflow=true
          fi

          if [ "${{ github.event_name }}" = "pull_request" ] && {
            [ "$DESKTOP_RELEASE_CHANGED" = "true" ] ||
            [ "$WEB_RELEASE_CHANGED" = "true" ] ||
            [ "$CLI_RELEASE_CHANGED" = "true" ] ||
            [ "$APP_RELEASE_CHANGED" = "true" ] ||
            [ "$DESKTOP_CONTRACT_RELEASE_CHANGED" = "true" ]
          }; then
            run_changeset_check=true
          fi

          echo "run_changeset_check=$run_changeset_check" >> "$GITHUB_OUTPUT"
          echo "run_full_workflow=$run_full_workflow" >> "$GITHUB_OUTPUT"

  changeset_check:
    name: Changeset validation
    runs-on: ubuntu-24.04
    if: needs.changes.outputs.run_changeset_check == 'true'
    needs: changes
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require changeset file
        shell: bash
        run: |
          changeset_files="$(git diff --name-only origin/main...HEAD -- '.changeset/*.md' || true)"
          changeset_files="$(printf '%s\n' "$changeset_files" | grep -Ev '^\.changeset/README\.md$' || true)"

          if [[ -z "$changeset_files" ]]; then
            echo "Release-affecting changes require at least one .changeset/*.md file." >&2
            exit 1
          fi

          printf '%s\n' "$changeset_files"

      - name: Validate changeset scopes
        run: pnpm changeset:validate-scopes

      - name: Check release plan
        run: pnpm exec changeset status --since origin/main

  quality:
    name: Quality and unit tests
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.run_full_workflow == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Run unit tests
        run: pnpm test:unit

  npm_package:
    name: Build and verify npm package
    runs-on: ubuntu-24.04
    if: needs.changes.outputs.run_full_workflow == 'true'
    needs: [changes, quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build npm package
        run: pnpm build:npm

      - name: Verify npm package contents
        run: pnpm --filter markdown-studio pack:check

  desktop_build:
    name: Build macOS desktop release
    runs-on: macos-latest
    if: needs.changes.outputs.run_full_workflow == 'true'
    needs: [changes, quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop artifacts
        run: pnpm dist:mac
