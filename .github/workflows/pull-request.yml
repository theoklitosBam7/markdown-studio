name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pull-request-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-24.04
    outputs:
      run_full_workflow: ${{ steps.compute.outputs.run_full_workflow }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Filter changed paths
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            meaningful_changes:
              - 'apps/**/*.{ts,vue,js,json}'
              - 'packages/**/*.{ts,vue,js,json}'
              - 'cypress/**/*'
              - '**/__tests__/**'
              - '**/*.spec.ts'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '**/vite.config.ts'
              - '**/tsconfig.json'
              - '.github/workflows/*.yml'

      - name: Compute workflow scope
        id: compute
        env:
          MEANINGFUL_CHANGED: ${{ steps.filter.outputs.meaningful_changes }}
        run: |
          run_full_workflow=false

          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$MEANINGFUL_CHANGED" = "true" ]; then
            run_full_workflow=true
          fi

          echo "run_full_workflow=$run_full_workflow" >> "$GITHUB_OUTPUT"

  quality:
    name: Quality and unit tests
    runs-on: ubuntu-24.04
    needs: changes
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm format

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Run unit tests
        run: pnpm test:unit

  npm_package:
    name: Build and verify npm package
    runs-on: ubuntu-24.04
    if: needs.changes.outputs.run_full_workflow == 'true'
    needs: [changes, quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build npm package
        run: pnpm build:npm

      - name: Verify npm package contents
        run: pnpm --filter markdown-studio pack:check

  desktop_build:
    name: Build macOS desktop release
    runs-on: macos-latest
    if: needs.changes.outputs.run_full_workflow == 'true'
    needs: [changes, quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop artifacts
        run: pnpm dist:mac
