name: Release Desktop + npm

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version like 1.2.3 or v1.2.3
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      ref: ${{ github.sha }}
    steps:
      - name: Resolve release version
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${{ github.event.inputs.version }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi

          version="${raw#v}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build macOS release
    needs: preflight
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm format

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Run unit tests
        run: pnpm test:unit

      - name: Align package versions to release version
        run: node ./scripts/update-release-package-versions.mjs "${{ needs.preflight.outputs.version }}"

      - name: Build desktop artifacts
        run: pnpm dist:mac

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: markdown-studio-macos
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error

  prerelease_placeholder:
    name: Create prerelease placeholder
    if: needs.preflight.outputs.is_prerelease == 'true'
    needs: preflight
    runs-on: ubuntu-24.04
    steps:
      - name: Create visible prerelease entry
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: Markdown Studio v${{ needs.preflight.outputs.version }}
          prerelease: true
          make_latest: false
          body: |
            Prerelease publishing is in progress.

            This entry is created before build and npm publish complete so failed prerelease runs remain visible in the Releases page.

  publish_npm:
    name: Publish npm package
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Align package versions to release version
        run: node ./scripts/update-release-package-versions.mjs "${{ needs.preflight.outputs.version }}"

      - name: Build npm package
        run: pnpm build:npm

      - name: Verify npm package contents
        run: pnpm --dir packages/cli pack:check

      - name: Publish npm package
        shell: bash
        working-directory: packages/cli
        run: |
          npm_tag=latest

          if [[ "${{ needs.preflight.outputs.is_prerelease }}" == "true" ]]; then
            npm_tag=next
          fi

          npm publish --provenance --tag "$npm_tag"

  release:
    name: Publish GitHub release
    needs: [preflight, build, publish_npm]
    runs-on: ubuntu-24.04
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: markdown-studio-macos
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: Markdown Studio v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
          fail_on_unmatched_files: true

  finalize:
    name: Finalize release
    needs: [preflight, release]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update package versions
        run: node ./scripts/update-release-package-versions.mjs "${{ needs.preflight.outputs.version }}"

      - name: Format package manifests
        run: pnpm format

      - name: Create version bump pull request
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            package.json
            packages/cli/package.json
          base: main
          branch: release/${{ needs.preflight.outputs.tag }}-version-bump
          commit-message: 'chore(release): prepare ${{ needs.preflight.outputs.tag }}'
          delete-branch: true
          title: 'chore(release): prepare ${{ needs.preflight.outputs.tag }}'
          body: |
            Updates the package manifests to the released version after publishing `${{ needs.preflight.outputs.tag }}`.
