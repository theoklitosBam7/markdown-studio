name: Publish npm Package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build and validate without publishing to npm or creating tags
        required: true
        default: false
        type: boolean
      ref:
        description: Git ref to publish from
        required: true
        default: main
        type: string

permissions: {}

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish npm package
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve publish metadata
        id: publish_meta
        shell: bash
        run: |
          version="$(node --input-type=module -e "import { readFileSync } from 'node:fs'; const pkg = JSON.parse(readFileSync('packages/cli/package.json', 'utf8')); process.stdout.write(pkg.version)")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid npm package version: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=npm-v$version" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        run: >
          node ./scripts/generate-release-notes.mjs
          --changelog packages/cli/CHANGELOG.md
          --current-tag "${{ steps.publish_meta.outputs.tag }}"
          --ref "${{ steps.publish_meta.outputs.sha }}"
          --tag-pattern "npm-v*"
          --artifact-type npm
          --version "${{ steps.publish_meta.outputs.version }}"
          --output "${{ runner.temp }}/npm-release-notes.md"

      - name: Build npm package
        run: pnpm build:npm

      - name: Verify npm package contents
        run: pnpm --filter markdown-studio pack:check

      - name: Publish npm package
        if: ${{ !inputs.dry_run }}
        working-directory: packages/cli
        run: npm publish --provenance --tag "${{ steps.publish_meta.outputs.npm_tag }}"

      - name: Ensure publish tag exists
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.publish_meta.outputs.sha }}
          RELEASE_TAG: ${{ steps.publish_meta.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          remote_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha' 2>/dev/null)" || remote_sha=""

          if [[ -n "$remote_sha" && "$remote_sha" != "$RELEASE_SHA" ]]; then
            echo "Tag $RELEASE_TAG already exists on a different commit: $remote_sha" >&2
            exit 1
          fi

          if [[ -z "$remote_sha" ]]; then
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${RELEASE_TAG}" \
              -f sha="$RELEASE_SHA" >/dev/null
          fi

      - name: Publish GitHub release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.publish_meta.outputs.tag }}
          target_commitish: ${{ steps.publish_meta.outputs.sha }}
          name: markdown-studio npm v${{ steps.publish_meta.outputs.version }}
          body_path: ${{ runner.temp }}/npm-release-notes.md
          prerelease: ${{ steps.publish_meta.outputs.is_prerelease }}
          make_latest: false

      - name: Report dry run result
        if: ${{ inputs.dry_run }}
        shell: bash
        run: |
          echo "Dry run completed for npm package version ${{ steps.publish_meta.outputs.version }}."
          echo "Skipped npm publish with tag ${{ steps.publish_meta.outputs.npm_tag }}, skipped creating tag ${{ steps.publish_meta.outputs.tag }}, and skipped publishing the GitHub release."
