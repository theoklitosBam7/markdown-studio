name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build and validate without creating tags or a GitHub release
        required: true
        default: false
        type: boolean
      ref:
        description: Git ref to release from
        required: true
        default: main
        type: string

permissions: {}

concurrency:
  group: release-desktop
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish desktop release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          version="$(node --input-type=module -e "import { readFileSync } from 'node:fs'; const pkg = JSON.parse(readFileSync('apps/desktop/package.json', 'utf8')); process.stdout.write(pkg.version)")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid desktop version: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=desktop-v$version" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        run: >
          node ./scripts/generate-release-notes.mjs
          --changelog apps/desktop/CHANGELOG.md
          --current-tag "${{ steps.release_meta.outputs.tag }}"
          --ref "${{ steps.release_meta.outputs.sha }}"
          --tag-pattern "desktop-v*"
          --artifact-type desktop
          --version "${{ steps.release_meta.outputs.version }}"
          --output "${{ runner.temp }}/desktop-release-notes.md"

      - name: Build desktop artifacts
        run: pnpm dist:mac

      - name: Ensure release tag exists
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ steps.release_meta.outputs.sha }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          remote_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha' 2>/dev/null || true)"

          if [[ -n "$remote_sha" && "$remote_sha" != "$RELEASE_SHA" ]]; then
            echo "Tag $RELEASE_TAG already exists on a different commit: $remote_sha" >&2
            exit 1
          fi

          if [[ -z "$remote_sha" ]]; then
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${RELEASE_TAG}" \
              -f sha="$RELEASE_SHA" >/dev/null
          fi

      - name: Publish GitHub release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ steps.release_meta.outputs.sha }}
          name: Markdown Studio Desktop v${{ steps.release_meta.outputs.version }}
          body_path: ${{ runner.temp }}/desktop-release-notes.md
          prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
          make_latest: ${{ steps.release_meta.outputs.make_latest }}
          files: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
          fail_on_unmatched_files: true

      - name: Report dry run result
        if: ${{ inputs.dry_run }}
        shell: bash
        run: |
          echo "Dry run completed for desktop version ${{ steps.release_meta.outputs.version }}."
          echo "Skipped creating tag ${{ steps.release_meta.outputs.tag }} and skipped publishing the GitHub release."

      - name: Update Homebrew tap
        if: ${{ !inputs.dry_run }}
        continue-on-error: true
        env:
          TAP_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        shell: bash
        run: |
          echo "::warning::Homebrew tap updates are best-effort and will not fail the desktop release."

          if [[ -z "$TAP_TOKEN" ]]; then
            echo "TAP_REPO_TOKEN secret is not set. Skipping Homebrew tap update."
            echo "Set the secret to a PAT with repo scope for theoklitosBam7/homebrew-tap to enable automatic cask updates."
            exit 0
          fi

          git clone --depth 1 https://github.com/theoklitosBam7/homebrew-tap.git /tmp/homebrew-tap

          DMG_FILE=$(find apps/desktop/release -maxdepth 1 -type f -name '*arm64*.dmg' | sort | head -n 1)
          if [[ -z "$DMG_FILE" ]]; then
            DMG_FILE=$(find apps/desktop/release -maxdepth 1 -type f -name '*.dmg' | sort | head -n 1)
          fi
          # electron-builder may produce filenames with spaces locally,
          # but GitHub Releases renames spaces to dots in asset names.
          # We compute sha256 from the local file regardless — the content is identical.
          if [[ -z "$DMG_FILE" ]]; then
            echo "No DMG file found in apps/desktop/release/"
            exit 1
          fi

          SHA256=$(shasum -a 256 "$DMG_FILE" | awk '{print $1}')
          VERSION="${{ steps.release_meta.outputs.version }}"
          CASK_FILE="/tmp/homebrew-tap/Casks/markdown-studio.rb"

          if [[ ! -f "$CASK_FILE" ]]; then
            echo "Cask file not found at $CASK_FILE"
            exit 1
          fi

          # Update version and sha256 in the cask file
          sed -i '' "s/^  version \".*\"/  version \"${VERSION}\"/" "$CASK_FILE"
          sed -i '' "s/^  sha256 \".*\"/  sha256 \"${SHA256}\"/" "$CASK_FILE"

          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update markdown-studio to ${VERSION}"
          git remote set-url origin "https://x-access-token:${TAP_TOKEN}@github.com/theoklitosBam7/homebrew-tap.git"
          git push origin HEAD:main
