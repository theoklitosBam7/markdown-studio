packages:
  - packages/*
  - apps/*

blockExoticSubdeps: true
strictDepBuilds: true

allowBuilds:
  cypress: true
  electron: true
  electron-winstaller: false
  esbuild: true
  sharp: true

catalog:
  typescript: ~5.9.3
  vite: ^8.0.11
  vitest: ^4.1.5
  vue-tsc: ^3.2.8
  '@types/node': ^24.12.3
  '@vitejs/plugin-vue': ^6.0.6
  vite-plugin-vue-devtools: ^8.1.2
